<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Seat | Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #2c3e50;
            --bg: #fdfbf7;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg);
            color: var(--dark-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #eee;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--dark-blue);
        }

        p.subtitle {
            font-style: italic;
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--gold);
        }

        button {
            background-color: var(--dark-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #34495e;
        }

        #result-area {
            margin-top: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-card {
            background: #fffaf0;
            border: 1px solid var(--gold);
            padding: 20px;
            border-radius: 10px;
            animation: fadeIn 0.5s ease;
        }

        .result-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .seat-info {
            font-size: 1.1rem;
            color: var(--dark-blue);
        }

        .gold-text {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.3rem;
        }

        .error-text {
            color: #e74c3c;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Find Your Seat</h1>
    <p class="subtitle">Enter your name to see your table assignment</p>

    <div class="search-box">
        <input type="text" id="guest-name-input" placeholder="e.g. Harvy Pidlaoan" onkeypress="handleKeyPress(event)">
        <button onclick="findSeat()">Search</button>
    </div>

    <div id="result-area">
        </div>
</div>

<script>
    // 1. UPDATE THIS WITH YOUR SHEET ID
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    
    // This URL format bypasses most CORS issues and gets clean CSV data
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    function handleKeyPress(e) {
        if (e.key === 'Enter') findSeat();
    }

    async function findSeat() {
        const searchInput = document.getElementById('guest-name-input').value.trim().toLowerCase();
        const resultArea = document.getElementById('result-area');
        
        if (!searchInput) {
            resultArea.innerHTML = "<p class='error-text'>Please enter your name.</p>";
            return;
        }

        resultArea.innerHTML = "<p>Searching...</p>";

        try {
            const response = await fetch(csvURL);
            if (!response.ok) throw new Error('Could not fetch data');
            
            const data = await response.text();
            
            // Clean up the CSV: remove quotes and extra spaces from every cell
            const rows = data.split('\n').map(row => 
                row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim())
            );

            // DEBUG: See what the website sees in your browser console (F12)
            console.log("Cleaned Data:", rows);

            // Search in Column B (Index 1)
            // If your names are in Column A, change rows.find(row => row[0]...)
            const guestMatch = rows.find(row => 
                row[1] && row[1].toLowerCase() === searchInput
            );

            if (guestMatch) {
                // Assuming Table is Column E (Index 4) and Seat is Column F (Index 5)
                const tableNum = guestMatch[4] || "TBD";
                const seatNum = guestMatch[5] || "TBD";

                resultArea.innerHTML = `
                    <div class="result-card">
                        <div class="result-name">Welcome, ${guestMatch[1]}!</div>
                        <div class="seat-info">
                            Table: <span class="gold-text">${tableNum}</span><br>
                            Seat: <span class="gold-text">${seatNum}</span>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `
                    <p class="error-text">Name not found.<br>
                    <small>Please try your full name or check with the coordinator.</small></p>
                `;
            }
        } catch (error) {
            console.error("Error details:", error);
            resultArea.innerHTML = "<p class='error-text'>Unable to load guest list. Ensure the sheet is shared as 'Anyone with the link'.</p>";
        }
    }
</script>

</body>
</html>
