<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Seat | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --navy-accent: #1a2a44;
            --silver-bright: #e2e2e2;
            --silver-text: #aeb2b7;
            --white: #ffffff;
            --gold-vip: #d4af37;
            --platinum-accent: #e5e4e2; 
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: 
                radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back-link {
            color: var(--silver-bright);
            text-decoration: none;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s;
            border: 1px solid rgba(226, 226, 226, 0.2);
            padding: 8px 12px;
        }

        .back-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.05);
        }

        .container {
            background: linear-gradient(135deg, #ffffff 0%, #dcdde1 100%);
            padding: 45px 30px 20px 30px; 
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--silver-bright);
            position: relative;
            box-sizing: border-box;
            color: var(--navy-deep);
        }

        .logo-area {
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--navy-deep);
            margin: 0;
            font-style: italic;
        }

        .logo-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--navy-deep), transparent);
            margin: 15px auto;
            position: relative;
            overflow: hidden;
        }
        
        .logo-divider::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: sparkle 3s infinite;
        }

        h1 {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--navy-accent);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .rsvp-note {
            font-size: 0.7rem;
            color: #636e72;
            line-height: 1.4;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 10px;
            font-weight: 400;
        }

        .search-box {
            position: relative;
            z-index: 2;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #b2bec3;
            border-radius: 0;
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: var(--navy-deep);
        }

        button {
            background-color: var(--navy-deep);
            color: var(--silver-bright);
            border: 1px solid var(--silver-bright);
            padding: 18px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
        }

        button:hover { background-color: var(--navy-accent); }

        #result-area {
            margin-top: 25px;
            min-height: 110px;
        }

        .result-card {
            background: var(--navy-deep);
            color: var(--silver-bright);
            padding: 25px;
            border: 1px solid var(--silver-bright);
            animation: fadeIn 0.6s ease-out forwards;
            position: relative;
        }

        .vip-status {
            border-color: var(--gold-vip) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .entourage-status {
            border-color: var(--platinum-accent) !important;
            box-shadow: 0 0 15px rgba(229, 228, 226, 0.3);
        }

        .result-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(226, 226, 226, 0.3);
            padding-bottom: 10px;
        }

        .guest-by {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--silver-text);
            margin-bottom: 15px;
            display: block;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-item .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--silver-text);
            display: block;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--white);
        }

        .vip-text { color: var(--gold-vip) !important; text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        .entourage-text { color: var(--platinum-accent) !important; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }

        .side-info {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(226, 226, 226, 0.1);
        }

        footer {
            margin-top: 40px;
            font-size: 0.65rem;
            color: #636e72;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(10, 25, 47, 0.1);
            border-top: 2px solid var(--navy-deep);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes sparkle { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .error-text { color: #8b0000; font-size: 0.85rem; font-weight: bold; margin-top: 10px;}
        .no-attendance { font-size: 0.9rem; color: #ff7675; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        
        @media (max-width: 480px) {
            .top-nav { position: relative; top: 0; left: 0; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="main.html#rsvp" class="back-link">← Back to Site</a>
</div>

<div class="container">
    <div class="logo-area">
        <p class="logo-text">Harvy & Christine</p>
        <div class="logo-divider"></div>
        <h1>Seat Finder</h1>
    </div>

    <p class="rsvp-note">
        Note: Please enter the name exactly as it was submitted in your RSVP.
    </p>

    <div class="search-box">
        <input type="text" id="guest-name-input" placeholder="Type Your Name Here" onkeypress="handleKeyPress(event)">
        <button onclick="findSeat()">Search Guest List</button>
    </div>

    <div id="result-area"></div>

    <footer>
    <p style="margin: 0; opacity: 0.8;">
        &copy; 2026 H&C Wedding. Coded & Designed by 
        <a href="https://instagram.com/hrvyngrs" style="color: inherit; text-decoration: none; border-bottom: 1px solid rgba(0,0,0,0.1);">HARVY</a>. 
        All rights reserved.
    </p>
    </footer>
</div>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    function handleKeyPress(e) { if (e.key === 'Enter') findSeat(); }

    async function findSeat() {
        const searchInput = document.getElementById('guest-name-input').value.trim().toLowerCase();
        const resultArea = document.getElementById('result-area');
        
        if (!searchInput) {
            resultArea.innerHTML = "<p class='error-text'>PLEASE ENTER YOUR NAME</p>";
            return;
        }

        resultArea.innerHTML = '<div class="loader"></div>';

        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            
            const rows = data.split('\n').map(row => 
                row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim())
            );

            const guestMatch = rows.find(row => 
                row[1] && row[1].toLowerCase() === searchInput
            );

            if (guestMatch) {
                const attendance = guestMatch[2] ? guestMatch[2].toLowerCase() : "";
                
                if (attendance === "no") {
                    resultArea.innerHTML = `
                        <div class="result-card">
                            <div class="result-name">Hi, ${guestMatch[1]}</div>
                            <div class="no-attendance">Our records show you are not attending.<br>No seat has been allocated.</div>
                        </div>
                    `;
                    return;
                }

                // DATA EXTRACTION
                let teamRaw = guestMatch[3] ? guestMatch[3].toLowerCase() : "";
                let broughtByRaw = guestMatch[4] ? guestMatch[4].toLowerCase() : "";
                
                // GUEST BY & SIDE LOGIC
                let guestByDisplay = guestMatch[4] || "Self";
                let sideDisplay = "N/A";

                if (broughtByRaw === "self") {
                    if (teamRaw.includes("groom")) {
                        guestByDisplay = "The Groom";
                        sideDisplay = "Team Groom";
                    } else if (teamRaw.includes("bride")) {
                        guestByDisplay = "The Bride";
                        sideDisplay = "Team Bride";
                    } else {
                        sideDisplay = guestMatch[3] || "N/A";
                    }
                } else {
                    if (teamRaw.includes("groom")) sideDisplay = "Team Groom";
                    else if (teamRaw.includes("bride")) sideDisplay = "Team Bride";
                    else sideDisplay = guestMatch[3] || "N/A";
                }

                let tableNum = guestMatch[5] || "TBD";
                const seatNum = guestMatch[6] || "TBD";

                // SPECIAL TIERS LOGIC
                let isVIP = false;
                let isEntourage = false;

                if (tableNum == "101" || tableNum == "102" || tableNum == "103") {
                    tableNum = "VIP";
                    isVIP = true;
                } else if (tableNum == "201" || tableNum == "202" || tableNum == "203" || tableNum == "204") {
                    tableNum = "Entourage";
                    isEntourage = true;
                }

                resultArea.innerHTML = `
                    <div class="result-card ${isVIP ? 'vip-status' : ''} ${isEntourage ? 'entourage-status' : ''}">
                        <div class="result-name">Welcome, ${guestMatch[1]}</div>
                        <span class="guest-by">Guest by: ${guestByDisplay}</span>
                        <div class="seat-grid">
                            <div class="info-item">
                                <span class="label">TABLE</span>
                                <span class="value ${isVIP ? 'vip-text' : ''} ${isEntourage ? 'entourage-text' : ''}">${tableNum}</span>
                            </div>
                            <div class="info-item">
                                <span class="label">SEAT</span>
                                <span class="value">${seatNum}</span>
                            </div>
                        </div>
                        <div class="side-info">
                            <div class="info-item">
                                <span class="label">TEAM SELECTION</span>
                                <span class="value" style="font-size: 1rem; letter-spacing: 1px; text-transform: uppercase;">${sideDisplay}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `<p class='error-text'>NAME NOT FOUND<br><small style="font-weight:normal; color:#444;">Check spelling or visit the coordinator.</small></p>`;
            }
        } catch (error) {
            resultArea.innerHTML = "<p class='error-text'>UNABLE TO LOAD LIST</p>";
        }
    }
</script>

</body>
</html>
