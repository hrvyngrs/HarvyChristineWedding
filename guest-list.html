<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seating Chart | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --navy-accent: #1a2a44;
            --silver-bright: #e2e2e2;
            --silver-dark: #707b7c;
            --white: #ffffff;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%);
            color: var(--white);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin: 0;
            color: var(--silver-bright);
            letter-spacing: 2px;
        }

        .header p {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.9rem;
            color: var(--silver-bright);
            opacity: 0.7;
            margin-top: 10px;
        }

        /* Table Grid Layout */
        .road-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .table-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(226, 226, 226, 0.2);
            padding: 25px;
            position: relative;
            animation: fadeIn 0.8s ease forwards;
        }

        .table-header {
            background: linear-gradient(135deg, #ffffff 0%, #dcdde1 100%);
            color: var(--navy-deep);
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .table-header span {
            font-size: 0.7rem;
            display: block;
            opacity: 0.7;
        }

        .guest-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(226, 226, 226, 0.1);
        }

        .guest-row:last-child {
            border-bottom: none;
        }

        .guest-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-style: italic;
        }

        .seat-number {
            font-size: 0.8rem;
            color: var(--silver-bright);
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--silver-bright);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        footer {
            margin-top: 60px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Seating Map</h1>
        <p>Harvy & Christine</p>
    </div>

    <div id="loading">
        <div class="loader"></div>
    </div>

    <div class="road-container" id="road-table"></div>

    <footer>Designed by Harvy</footer>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function loadRoadTable() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const guests = rows.map(row => {
                const cols = row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim());
                return {
                    name: cols[1],
                    attendance: cols[2],
                    table: cols[4] || "TBD",
                    seat: cols[5] || "TBD"
                };
            }).filter(g => g.name && g.attendance === "Yes");

            // Grouping guests by Table
            const groupedByTable = guests.reduce((acc, guest) => {
                if (!acc[guest.table]) acc[guest.table] = [];
                acc[guest.table].push(guest);
                return acc;
            }, {});

            // Sort tables numerically
            const sortedTables = Object.keys(groupedByTable).sort((a, b) => a - b);

            displayRoadTable(sortedTables, groupedByTable);
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error(error);
        }
    }

    function displayRoadTable(tables, groupedData) {
        const container = document.getElementById('road-table');
        
        container.innerHTML = tables.map(table => `
            <div class="table-group">
                <div class="table-header">
                    <span>Assigned to</span>
                    Table ${table}
                </div>
                ${groupedData[table].sort((a, b) => a.name.localeCompare(b.name)).map(g => `
                    <div class="guest-row">
                        <span class="guest-name">${g.name}</span>
                        <span class="seat-number">Seat ${g.seat}</span>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    window.onload = loadRoadTable;
</script>
</body>
</html>
