<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --silver-bright: #e2e2e2;
            --white: #ffffff;
            /* Brightened groom color for visibility */
            --groom-color: #2c4a7c; 
            --bride-color: #aeb2b7;
            --gold-vip: #d4af37;
            --platinum-entourage: #e5e4e2;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%);
            color: var(--white);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .back-link {
            color: var(--silver-bright);
            text-decoration: none;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s;
            border: 1px solid rgba(226, 226, 226, 0.2);
            padding: 8px 12px;
        }

        .back-link:hover { opacity: 1; background: rgba(255, 255, 255, 0.05); }

        .header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(226, 226, 226, 0.2);
            padding-bottom: 20px;
            width: 90%;
            max-width: 600px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--silver-bright);
            margin: 0;
            font-style: italic;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.8;
            margin: 10px 0;
        }

        /* SEPARATED LEGEND STYLING */
        .legend-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .legend {
            display: flex; gap: 15px; 
            background: rgba(255,255,255,0.05); padding: 8px 20px;
            border-radius: 20px; border: 1px solid rgba(226,226,226,0.1);
            font-size: 0.7rem; text-transform: uppercase;
            justify-content: center;
        }
        
        .legend-title { font-size: 0.6rem; opacity: 0.6; letter-spacing: 1px; margin-bottom: -5px; }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .groom-dot { background: var(--groom-color); border: 1px solid white; }
        .bride-dot { background: var(--bride-color); border: 1px solid var(--navy-deep); }
        .vip-dot { background: var(--gold-vip); border: 1px solid white; }
        .entourage-dot { background: var(--platinum-entourage); border: 1px solid var(--navy-deep); }

        .wedding-stage {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--silver-bright);
            padding: 40px 20px;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
        }
        .stage-label {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--navy-deep);
            padding: 0 15px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .couple-table {
            background: linear-gradient(135deg, #ffffff 0%, #e2e2e2 100%);
            width: 220px;
            padding: 15px;
            margin: 0 auto;
            border-radius: 5px;
            color: var(--navy-deep);
            border: 2px solid var(--gold-vip);
        }
        .couple-names { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.2rem; }

        .map-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }

        .table-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200px;
        }

        .chair-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            color: var(--navy-deep);
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
        .chair-icon span { font-size: 0.5rem; text-transform: uppercase; }
        .chair-icon div { font-size: 1.1rem; }

        .vip-chair { background: var(--gold-vip); }
        .ent-chair { background: var(--platinum-entourage); }
        .reg-chair { background: var(--white); }

        .guest-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .guest-item {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .guest-groom { background: var(--groom-color); color: white; }
        .guest-bride { background: var(--bride-color); color: var(--navy-deep); }

        .waiting-list-section {
            width: 90%; max-width: 800px;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border: 1px solid rgba(226, 226, 226, 0.1);
        }
        .waiting-list-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; text-align: center;
            margin-bottom: 20px;
        }
        .waiting-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .waiting-guest {
            background: var(--white);
            padding: 10px;
            color: var(--navy-deep);
            font-family: 'Playfair Display', serif;
            font-weight: 700; text-align: center;
            font-size: 0.8rem;
        }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--silver-bright); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer { margin-top: 40px; font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 480px) {
            .logo-text { font-size: 2.2rem; }
            .map-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="main.html#rsvp" class="back-link">← Website</a>
        <a href="seat-finder.html" class="back-link">Seat Finder →</a>
    </div>

    <div class="header">
        <h1 class="logo-text">Harvy & Christine</h1>
        <p>Seating Map</p>
    </div>

    <div class="legend-container">
        <div class="legend-title">TABLE TYPE</div>
        <div class="legend">
            <div><span class="dot vip-dot"></span> VIP</div>
            <div><span class="dot entourage-dot"></span> Entourage</div>
        </div>
        <div class="legend-title">GUEST TEAM</div>
        <div class="legend">
            <div><span class="dot groom-dot"></span> Team Groom</div>
            <div><span class="dot bride-dot"></span> Team Bride</div>
        </div>
    </div>

    <div class="wedding-stage">
        <div class="stage-label">Main Stage</div>
        <div class="couple-table">
            <span style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px;">The Newlyweds</span>
            <div class="couple-names">Harvy & Christine</div>
        </div>
    </div>

    <div id="loading"><div class="loader"></div></div>
    
    <div class="map-container" id="map-container"></div>

    <div class="waiting-list-section" id="waiting-list-section" style="display: none;">
        <div class="waiting-list-header">Waiting List</div>
        <div class="waiting-list-grid" id="waiting-list-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 H&C Wedding. Coded & Designed by HARVY.</p>
    </footer>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function loadSeatingMap() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const guests = rows.map(row => {
                const cols = row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim());
                return {
                    name: cols[1],
                    attendance: cols[2] ? cols[2].toLowerCase() : "",
                    side: cols[3] ? cols[3].toLowerCase() : "bride",
                    table: cols[5],
                    seat: parseInt(cols[6]) || 0
                };
            }).filter(g => g.name && g.attendance !== 'no');

            const assignedGuests = guests.filter(g => g.table && g.table.toLowerCase() !== 'tbd');
            const waitingGuests = guests.filter(g => !g.table || g.table.toLowerCase() === 'tbd');

            const groupedByTable = assignedGuests.reduce((acc, guest) => {
                if (!acc[guest.table]) acc[guest.table] = [];
                acc[guest.table].push(guest);
                return acc;
            }, {});

            // UPDATED SORTING: VIP -> ENTOURAGE -> REGULAR
            const sortedTables = Object.keys(groupedByTable).sort((a, b) => {
                const isVIP = (val) => val >= 101 && val <= 103;
                const isENT = (val) => val >= 201 && val <= 204;
                
                const aVal = parseInt(a);
                const bVal = parseInt(b);

                if (isVIP(aVal) && !isVIP(bVal)) return -1;
                if (!isVIP(aVal) && isVIP(bVal)) return 1;
                if (isENT(aVal) && !isENT(bVal)) return -1;
                if (!isENT(aVal) && isENT(bVal)) return 1;
                
                return aVal - bVal;
            });
            
            displayMap(sortedTables, groupedByTable);
            displayWaitingList(waitingGuests);
            document.getElementById('loading').style.display = 'none';
        } catch (error) { console.error(error); }
    }

    function displayMap(tables, groupedData) {
        const container = document.getElementById('map-container');
        container.innerHTML = tables.map(table => {
            const guests = groupedData[table].sort((a, b) => a.seat - b.seat);
            const num = parseInt(table);
            const isVIP = (num >= 101 && num <= 103);
            const isEnt = (num >= 201 && num <= 204);
            
            let typeClass = "reg-chair";
            let label = table;
            if (isVIP) { typeClass = "vip-chair"; label = "VIP"; }
            if (isEnt) { typeClass = "ent-chair"; label = "ENT"; }
            
            const guestHTML = guests.map(g => {
                const sideClass = g.side.includes('groom') ? 'guest-groom' : 'guest-bride';
                return `<div class="guest-item ${sideClass}">${g.name}</div>`;
            }).join('');

            return `
                <div class="table-box">
                    <div class="chair-icon ${typeClass}">
                        <span>Table</span>
                        <div>${label}</div>
                    </div>
                    <div class="guest-list">${guestHTML}</div>
                </div>
            `;
        }).join('');
    }

    function displayWaitingList(waitingGuests) {
        const section = document.getElementById('waiting-list-section');
        const grid = document.getElementById('waiting-list-grid');
        if (waitingGuests.length === 0) return;
        section.style.display = 'block';
        waitingGuests.sort((a, b) => a.name.localeCompare(b.name));
        grid.innerHTML = waitingGuests.map(g => `<div class="waiting-guest">${g.name}</div>`).join('');
    }

    window.onload = loadSeatingMap;
</script>
</body>
</html>
