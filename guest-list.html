<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --silver-bright: #e2e2e2;
            --white: #ffffff;
            --groom-color: #1a2a44;
            --bride-color: #aeb2b7;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%);
            color: var(--white);
            margin: 0;
            padding: 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- ENHANCED LOGO SECTION --- */
        .header { 
            text-align: center; 
            margin-bottom: 50px; 
            border-bottom: 1px solid rgba(226, 226, 226, 0.2);
            padding-bottom: 30px;
            width: 90%;
            max-width: 600px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem; /* Significantly larger */
            color: var(--silver-bright);
            margin: 0;
            font-style: italic;
            line-height: 1;
            /* Added silver metallic glow */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(226, 226, 226, 0.3);
            letter-spacing: -1px;
        }

        .header p {
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            color: var(--silver-bright);
            letter-spacing: 6px; /* Wider spacing for elegance */
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* --- REST OF THE STYLES --- */
        .legend {
            display: flex; gap: 15px; margin-bottom: 40px;
            background: rgba(255,255,255,0.05); padding: 12px 25px;
            border-radius: 30px; border: 1px solid rgba(226,226,226,0.1);
            font-size: 0.8rem; text-transform: uppercase;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .groom-dot { background: var(--groom-color); border: 1px solid white; }
        .bride-dot { background: var(--bride-color); border: 1px solid var(--navy-deep); }

        .map-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 60px;
            width: 100%;
            max-width: 1200px;
            justify-items: center;
        }

        .table-circle {
            position: relative;
            width: 280px; height: 280px;
            display: flex; justify-content: center; align-items: center;
        }

        .table-hub {
            width: 85px; height: 85px;
            background: linear-gradient(135deg, #ffffff 0%, #dcdde1 100%);
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--navy-deep); font-weight: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10; border: 2px solid var(--silver-bright);
        }
        .table-hub span { font-size: 0.6rem; text-transform: uppercase; }
        .table-hub div { font-size: 1.6rem; }

        .seat {
            position: absolute;
            width: 115px; padding: 8px;
            font-size: 0.75rem; text-align: center;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .seat-groom { background: var(--groom-color); color: white; border-bottom: 2px solid white; }
        .seat-bride { background: var(--bride-color); color: var(--navy-deep); border-bottom: 2px solid var(--navy-deep); }
        .seat-name { font-family: 'Playfair Display', serif; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .seat-num { font-size: 0.6rem; opacity: 0.8; }

        .waiting-list-section {
            width: 90%; max-width: 800px;
            margin-top: 80px;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(226, 226, 226, 0.1);
        }
        .waiting-list-header {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; text-align: center;
            color: var(--silver-bright);
            margin-bottom: 30px;
            font-style: italic;
        }
        .waiting-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .waiting-guest {
            background: var(--white);
            padding: 15px;
            color: var(--navy-deep);
            font-family: 'Playfair Display', serif;
            font-weight: 700; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--silver-bright); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer { 
            margin-top: 60px; 
            font-size: 0.7rem; 
            opacity: 0.5; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* Mobile specific font adjustment */
        @media (max-width: 480px) {
            .logo-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo-text">Harvy & Christine</h1>
        <p>Seating Map</p>
    </div>

    <div class="legend">
        <div><span class="dot groom-dot"></span> Team Groom</div>
        <div><span class="dot bride-dot"></span> Team Bride</div>
    </div>

    <div id="loading"><div class="loader"></div></div>
    
    <div class="map-container" id="map-container"></div>

    <div class="waiting-list-section" id="waiting-list-section" style="display: none;">
        <div class="waiting-list-header">Waiting List</div>
        <div class="waiting-list-grid" id="waiting-list-grid"></div>
    </div>

    <footer>Designed by Harvy</footer>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function loadSeatingMap() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const guests = rows.map(row => {
                const cols = row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim());
                return {
                    name: cols[1],
                    side: cols[3] ? cols[3].toLowerCase() : "bride",
                    table: cols[4],
                    seat: parseInt(cols[5]) || 0
                };
            }).filter(g => g.name);

            const assignedGuests = guests.filter(g => g.table && g.table.toLowerCase() !== 'tbd');
            const waitingGuests = guests.filter(g => !g.table || g.table.toLowerCase() === 'tbd');

            const groupedByTable = assignedGuests.reduce((acc, guest) => {
                if (!acc[guest.table]) acc[guest.table] = [];
                acc[guest.table].push(guest);
                return acc;
            }, {});

            const sortedTables = Object.keys(groupedByTable).sort((a, b) => a - b);
            
            displayMap(sortedTables, groupedByTable);
            displayWaitingList(waitingGuests);
            
            document.getElementById('loading').style.display = 'none';
        } catch (error) { console.error(error); }
    }

    function displayMap(tables, groupedData) {
        const container = document.getElementById('map-container');
        container.innerHTML = tables.map(table => {
            const guests = groupedData[table].sort((a, b) => a.seat - b.seat);
            const totalSeats = guests.length;
            const radius = 110; 

            const seatHTML = guests.map((g, index) => {
                const angle = (index / totalSeats) * (Math.PI * 2);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const sideClass = g.side.includes('groom') ? 'seat-groom' : 'seat-bride';
                
                return `
                    <div class="seat ${sideClass}" style="left: calc(50% + ${x}px - 57px); top: calc(50% + ${y}px - 20px);">
                        <span class="seat-name">${g.name}</span>
                        <span class="seat-num">Seat ${g.seat}</span>
                    </div>
                `;
            }).join('');

            return `<div class="table-circle"><div class="table-hub"><span>Table</span><div>${table}</div></div>${seatHTML}</div>`;
        }).join('');
    }

    function displayWaitingList(waitingGuests) {
        const section = document.getElementById('waiting-list-section');
        const grid = document.getElementById('waiting-list-grid');
        if (waitingGuests.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        waitingGuests.sort((a, b) => a.name.localeCompare(b.name));
        grid.innerHTML = waitingGuests.map(g => `<div class="waiting-guest">${g.name}</div>`).join('');
    }

    window.onload = loadSeatingMap;
</script>
</body>
</html>
