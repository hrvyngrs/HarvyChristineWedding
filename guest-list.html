<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --silver-bright: #e2e2e2;
            --white: #ffffff;
            --groom-color: #2c4a7c; 
            --bride-color: #aeb2b7;
            --gold-vip: #d4af37;
            --platinum-entourage: #e5e4e2;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%);
            color: var(--white);
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .back-link {
            color: var(--silver-bright);
            text-decoration: none;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            border: 1px solid rgba(226, 226, 226, 0.2);
            padding: 6px 10px;
        }

        .header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(226, 226, 226, 0.2);
            padding-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--silver-bright);
            margin: 0;
            font-style: italic;
        }

        .header p {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            margin: 5px 0;
        }

        .legend-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            width: 100%;
        }

        .legend {
            display: flex; gap: 12px; 
            background: rgba(255,255,255,0.05); padding: 8px 15px;
            border-radius: 20px; border: 1px solid rgba(226,226,226,0.1);
            font-size: 0.65rem; text-transform: uppercase;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .legend-title { font-size: 0.55rem; opacity: 0.6; letter-spacing: 1px; }

        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .groom-dot { background: var(--groom-color); border: 1px solid white; }
        .bride-dot { background: var(--bride-color); border: 1px solid var(--navy-deep); }
        .vip-dot { background: var(--gold-vip); border: 1px solid white; }
        .entourage-dot { background: var(--platinum-entourage); border: 1px solid var(--navy-deep); }

        .wedding-stage {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--silver-bright);
            padding: 30px 15px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }
        .stage-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--navy-deep);
            padding: 0 10px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .couple-table {
            background: linear-gradient(135deg, #ffffff 0%, #e2e2e2 100%);
            width: 180px;
            padding: 12px;
            margin: 0 auto;
            border-radius: 5px;
            color: var(--navy-deep);
            border: 2px solid var(--gold-vip);
        }
        .couple-names { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1rem; }

        .map-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        /* UPDATED: DUAL COLUMN TABLE BOX */
        .table-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: row; /* Horizontal layout for guests-icon-guests */
            justify-content: space-between;
            align-items: center;
            min-height: 120px;
        }

        .chair-icon {
            flex-shrink: 0;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            color: var(--navy-deep);
            margin: 0 10px;
            border: 2px solid white;
            order: 2; /* Keeps icon in center */
        }
        .chair-icon span { font-size: 0.4rem; text-transform: uppercase; }
        .chair-icon div { font-size: 0.9rem; }

        .vip-chair { background: var(--gold-vip); }
        .ent-chair { background: var(--platinum-entourage); }
        .reg-chair { background: var(--white); }

        .guest-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .col-left { order: 1; align-items: flex-end; }
        .col-right { order: 3; align-items: flex-start; }

        .guest-item {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            padding: 6px 8px;
            border-radius: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
        }
        
        .seat-num {
            font-family: 'Lato', sans-serif;
            font-size: 0.55rem;
            text-transform: uppercase;
            margin-right: 5px;
            opacity: 0.8;
            background: rgba(0,0,0,0.2);
            padding: 1px 4px;
            border-radius: 3px;
            min-width: 35px;
            text-align: center;
        }

        .guest-groom { background: var(--groom-color); color: white; }
        .guest-bride { background: var(--bride-color); color: var(--navy-deep); }
        .guest-bride .seat-num { background: rgba(255,255,255,0.3); }

        .waiting-list-section {
            width: 100%; max-width: 800px;
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border: 1px solid rgba(226, 226, 226, 0.1);
        }
        .waiting-list-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; text-align: center;
            margin-bottom: 15px;
        }
        .waiting-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .waiting-guest {
            background: var(--white);
            padding: 8px;
            color: var(--navy-deep);
            font-family: 'Playfair Display', serif;
            font-weight: 700; text-align: center;
            font-size: 0.75rem;
        }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--silver-bright); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer { margin-top: 30px; font-size: 0.6rem; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; text-align: center; }

        @media (max-width: 600px) {
            .map-container { grid-template-columns: 1fr; }
            .table-box { padding: 10px; }
            .chair-icon { width: 45px; height: 45px; margin: 0 5px; }
            .guest-item { font-size: 0.65rem; padding: 4px 6px; }
            .seat-num { min-width: 30px; font-size: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="main.html#rsvp" class="back-link">← Website</a>
        <a href="seat-finder.html" class="back-link">Seat Finder →</a>
    </div>

    <div class="header">
        <h1 class="logo-text">Harvy & Christine</h1>
        <p>Seating Map</p>
    </div>

    <div class="legend-container">
        <div class="legend-title">TABLE TYPE</div>
        <div class="legend">
            <div><span class="dot vip-dot"></span> VIP</div>
            <div><span class="dot entourage-dot"></span> Entourage</div>
        </div>
        <div class="legend-title">GUEST TEAM</div>
        <div class="legend">
            <div><span class="dot groom-dot"></span> Team Groom</div>
            <div><span class="dot bride-dot"></span> Team Bride</div>
        </div>
    </div>

    <div class="wedding-stage">
        <div class="stage-label">Main Stage</div>
        <div class="couple-table">
            <span style="font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">The Newlyweds</span>
            <div class="couple-names">Harvy & Christine</div>
        </div>
    </div>

    <div id="loading"><div class="loader"></div></div>
    
    <div class="map-container" id="map-container"></div>

    <div class="waiting-list-section" id="waiting-list-section" style="display: none;">
        <div class="waiting-list-header">Waiting List</div>
        <div class="waiting-list-grid" id="waiting-list-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 H&C Wedding. Coded & Designed by HARVY.</p>
    </footer>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function loadSeatingMap() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const guests = rows.map(row => {
                const cols = row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim());
                return {
                    name: cols[1],
                    attendance: cols[2] ? cols[2].toLowerCase() : "",
                    side: cols[3] ? cols[3].toLowerCase() : "bride",
                    table: cols[5],
                    seat: parseInt(cols[6]) || 0
                };
            }).filter(g => g.name && g.attendance !== 'no');

            const assignedGuests = guests.filter(g => g.table && g.table.toLowerCase() !== 'tbd');
            const waitingGuests = guests.filter(g => !g.table || g.table.toLowerCase() === 'tbd');

            const groupedByTable = assignedGuests.reduce((acc, guest) => {
                if (!acc[guest.table]) acc[guest.table] = [];
                acc[guest.table].push(guest);
                return acc;
            }, {});

            const sortedTables = Object.keys(groupedByTable).sort((a, b) => {
                const isVIP = (val) => val >= 101 && val <= 103;
                const isENT = (val) => val >= 201 && val <= 204;
                const aVal = parseInt(a);
                const bVal = parseInt(b);
                if (isVIP(aVal) && !isVIP(bVal)) return -1;
                if (!isVIP(aVal) && isVIP(bVal)) return 1;
                if (isENT(aVal) && !isENT(bVal)) return -1;
                if (!isENT(aVal) && isENT(bVal)) return 1;
                return aVal - bVal;
            });
            
            displayMap(sortedTables, groupedByTable);
            displayWaitingList(waitingGuests);
            document.getElementById('loading').style.display = 'none';
        } catch (error) { console.error(error); }
    }

    function displayMap(tables, groupedData) {
        const container = document.getElementById('map-container');
        container.innerHTML = tables.map(table => {
            const allGuests = groupedData[table].sort((a, b) => a.seat - b.seat);
            
            // Split guests into left and right columns
            const mid = Math.ceil(allGuests.length / 2);
            const leftGuests = allGuests.slice(0, mid);
            const rightGuests = allGuests.slice(mid);

            const num = parseInt(table);
            const isVIP = (num >= 101 && num <= 103);
            const isEnt = (num >= 201 && num <= 204);
            let typeClass = "reg-chair";
            let label = table;
            if (isVIP) { typeClass = "vip-chair"; label = "VIP"; }
            if (isEnt) { typeClass = "ent-chair"; label = "ENT"; }
            
            const createGuestHTML = (g) => {
                const sideClass = g.side.includes('groom') ? 'guest-groom' : 'guest-bride';
                return `<div class="guest-item ${sideClass}"><span class="seat-num">S${g.seat}</span> ${g.name}</div>`;
            };

            return `
                <div class="table-box">
                    <div class="guest-col col-left">
                        ${leftGuests.map(createGuestHTML).join('')}
                    </div>
                    <div class="chair-icon ${typeClass}">
                        <span>Table</span>
                        <div>${label}</div>
                    </div>
                    <div class="guest-col col-right">
                        ${rightGuests.map(createGuestHTML).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function displayWaitingList(waitingGuests) {
        const section = document.getElementById('waiting-list-section');
        const grid = document.getElementById('waiting-list-grid');
        if (waitingGuests.length === 0) return;
        section.style.display = 'block';
        waitingGuests.sort((a, b) => a.name.localeCompare(b.name));
        grid.innerHTML = waitingGuests.map(g => `<div class="waiting-guest">${g.name}</div>`).join('');
    }

    window.onload = loadSeatingMap;
</script>
</body>
</html>
