<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan | Harvy & Christine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #0a192f;
            --silver-bright: #e2e2e2;
            --white: #ffffff;
            --groom-color: #2c4a7c; 
            --bride-color: #aeb2b7;
            --gold-vip: #d4af37;
            --platinum-silver: #c0c0c0; /* Silver color for Silver tables */
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--navy-deep);
            background-image: radial-gradient(circle at center, rgba(26, 42, 68, 0.8) 0%, var(--navy-deep) 100%);
            color: var(--white);
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .back-link {
            color: var(--silver-bright);
            text-decoration: none;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            border: 1px solid rgba(226, 226, 226, 0.2);
            padding: 6px 10px;
        }

        .header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(226, 226, 226, 0.2);
            padding-bottom: 15px;
            width: 100%;
            max-width: 600px;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--silver-bright);
            margin: 0;
            font-style: italic;
        }

        .header p {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            margin: 5px 0;
        }

        .legend-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            width: 100%;
        }

        .legend {
            display: flex; gap: 12px; 
            background: rgba(255,255,255,0.05); padding: 8px 15px;
            border-radius: 20px; border: 1px solid rgba(226,226,226,0.1);
            font-size: 0.65rem; text-transform: uppercase;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .legend-title { font-size: 0.55rem; opacity: 0.6; letter-spacing: 1px; }

        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .groom-dot { background: var(--groom-color); border: 1px solid white; }
        .bride-dot { background: var(--bride-color); border: 1px solid var(--navy-deep); }
        .vip-dot { background: var(--gold-vip); border: 1px solid white; }
        .silver-dot { background: var(--platinum-silver); border: 1px solid var(--navy-deep); }

        .wedding-stage {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--silver-bright);
            padding: 30px 15px;
            margin-bottom: 50px;
            text-align: center;
            position: relative;
        }
        .stage-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--navy-deep);
            padding: 0 10px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .couple-table {
            background: linear-gradient(135deg, #ffffff 0%, #e2e2e2 100%);
            width: 180px;
            padding: 12px;
            margin: 0 auto;
            border-radius: 5px;
            color: var(--navy-deep);
            border: 2px solid var(--gold-vip);
        }
        .couple-names { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1rem; }

        .map-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 70px 30px;
            width: 100%;
            max-width: 1600px;
            padding: 10px;
        }

        .table-group {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            min-height: 220px;
        }

        .table-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 15px;
        }

        .rectangular-table {
            width: 80px;
            height: 200px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            color: var(--navy-deep);
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2;
        }
        .rectangular-table span { font-size: 0.4rem; text-transform: uppercase; }
        .rectangular-table div { font-size: 0.85rem; text-align: center; }

        .vip-chair { background: var(--gold-vip); }
        .silver-chair { background: var(--platinum-silver); }
        .reg-chair { background: var(--white); }

        .guest-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            height: 200px;
            justify-content: space-around;
        }
        .col-left { align-items: flex-end; }
        .col-right { align-items: flex-start; }

        .guest-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .col-left .guest-row { justify-content: flex-end; }

        .chair-seat {
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.6rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .guest-item {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
            min-height: 20px;
            display: flex;
            align-items: center;
        }

        .guest-groom { background: var(--groom-color); color: white; }
        .guest-bride { background: var(--bride-color); color: var(--navy-deep); }
        .empty-seat { opacity: 0; pointer-events: none; }

        .waiting-list-section {
            width: 100%; max-width: 800px;
            margin-top: 60px;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border: 1px solid rgba(226, 226, 226, 0.1);
        }
        .waiting-list-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; text-align: center;
            margin-bottom: 20px;
        }
        .waiting-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .waiting-guest {
            background: var(--white);
            padding: 8px;
            color: var(--navy-deep);
            font-family: 'Playfair Display', serif;
            font-weight: 700; text-align: center;
            font-size: 0.75rem;
        }

        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--silver-bright); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer { margin-top: 50px; font-size: 0.6rem; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; text-align: center; }

        @media (max-width: 600px) {
            .map-container { grid-template-columns: 1fr; gap: 50px; }
            .guest-item { max-width: 120px; font-size: 0.65rem; }
            .rectangular-table { width: 70px; height: 180px; }
            .guest-col { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="main.html#rsvp" class="back-link">← Website</a>
        <a href="seat-finder.html" class="back-link">Seat Finder →</a>
    </div>

    <div class="header">
        <h1 class="logo-text">Harvy & Christine</h1>
        <p>Seating Map</p>
    </div>

    <div class="legend-container">
        <div class="legend-title">TABLE TYPE</div>
        <div class="legend">
            <div><span class="dot vip-dot"></span> VIP</div>
            <div><span class="dot silver-dot"></span> SILVER</div>
        </div>
        <div class="legend-title">GUEST TEAM</div>
        <div class="legend">
            <div><span class="dot groom-dot"></span> Team Groom</div>
            <div><span class="dot bride-dot"></span> Team Bride</div>
        </div>
    </div>

    <div class="wedding-stage">
        <div class="stage-label">Main Stage</div>
        <div class="couple-table">
            <span style="font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">The Newlyweds</span>
            <div class="couple-names">Harvy & Christine</div>
        </div>
    </div>

    <div id="loading"><div class="loader"></div></div>
    
    <div class="map-container" id="map-container"></div>

    <div class="waiting-list-section" id="waiting-list-section" style="display: none;">
        <div class="waiting-list-header">Waiting List</div>
        <div class="waiting-list-grid" id="waiting-list-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 H&C Wedding. Coded & Designed by HARVY.</p>
    </footer>

<script>
    const sheetId = '1ZSKHoNvsZ79jPjFXGF-9wdDO9cgJxs11148wNT7L4MY';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function loadSeatingMap() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const guests = rows.map(row => {
                const cols = row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').replace(/"/g, '').trim());
                return {
                    name: cols[1],
                    attendance: cols[2] ? cols[2].toLowerCase() : "",
                    side: cols[3] ? cols[3].toLowerCase() : "bride",
                    table: cols[5],
                    seat: parseInt(cols[6]) || 0
                };
            }).filter(g => g.name && g.attendance !== 'no');

            const assignedGuests = guests.filter(g => g.table && g.table.toLowerCase() !== 'tbd');
            const waitingGuests = guests.filter(g => !g.table || g.table.toLowerCase() === 'tbd');

            const groupedByTable = assignedGuests.reduce((acc, guest) => {
                if (!acc[guest.table]) acc[guest.table] = [];
                acc[guest.table].push(guest);
                return acc;
            }, {});

            const sortedTables = Object.keys(groupedByTable).sort((a, b) => {
                const isVIP = (val) => val >= 101 && val <= 103;
                const isSilver = (val) => val >= 201 && val <= 204;
                const aVal = parseInt(a);
                const bVal = parseInt(b);
                if (isVIP(aVal) && !isVIP(bVal)) return -1;
                if (!isVIP(aVal) && isVIP(bVal)) return 1;
                if (isSilver(aVal) && !isSilver(bVal)) return -1;
                if (!isSilver(aVal) && isSilver(bVal)) return 1;
                return aVal - bVal;
            });
            
            displayMap(sortedTables, groupedByTable);
            displayWaitingList(waitingGuests);
            document.getElementById('loading').style.display = 'none';
        } catch (error) { console.error(error); }
    }

    function displayMap(tables, groupedData) {
        const container = document.getElementById('map-container');
        container.innerHTML = tables.map(table => {
            const allGuests = groupedData[table].sort((a, b) => a.seat - b.seat);
            
            // 12 chairs: 1-6 left, 7-12 right
            const leftSide = [1, 2, 3, 4, 5, 6];
            const rightSide = [7, 8, 9, 10, 11, 12];

            const num = parseInt(table);
            const isVIP = (num >= 101 && num <= 103);
            const isSilver = (num >= 201 && num <= 204);
            let typeClass = "reg-chair";
            let label = table;
            if (isVIP) { typeClass = "vip-chair"; label = "VIP"; }
            if (isSilver) { typeClass = "silver-chair"; label = "SILVER"; }
            
            const getSeatHTML = (seatNum, align) => {
                const guest = allGuests.find(g => g.seat === seatNum);
                const chair = `<div class="chair-seat">${seatNum}</div>`;
                
                // Show chair even if no guest is assigned
                if (!guest) {
                    const spacer = `<div class="guest-item empty-seat">Empty Seat</div>`;
                    return `<div class="guest-row">${align === 'left' ? spacer + chair : chair + spacer}</div>`;
                }
                
                const sideClass = guest.side.includes('groom') ? 'guest-groom' : 'guest-bride';
                const nameTag = `<div class="guest-item ${sideClass}">${guest.name}</div>`;
                
                return `<div class="guest-row">${align === 'left' ? nameTag + chair : chair + nameTag}</div>`;
            };

            return `
                <div class="table-group">
                    <div class="guest-col col-left">
                        ${leftSide.map(s => getSeatHTML(s, 'left')).join('')}
                    </div>
                    <div class="table-wrapper">
                        <div class="rectangular-table ${typeClass}">
                            <span>Table</span>
                            <div>${label}</div>
                        </div>
                    </div>
                    <div class="guest-col col-right">
                        ${rightSide.map(s => getSeatHTML(s, 'right')).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function displayWaitingList(waitingGuests) {
        const section = document.getElementById('waiting-list-section');
        const grid = document.getElementById('waiting-list-grid');
        if (waitingGuests.length === 0) return;
        section.style.display = 'block';
        waitingGuests.sort((a, b) => a.name.localeCompare(b.name));
        grid.innerHTML = waitingGuests.map(g => `<div class="waiting-guest">${g.name}</div>`).join('');
    }

    window.onload = loadSeatingMap;
</script>
</body>
</html>
