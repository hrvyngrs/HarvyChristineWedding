<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H&C | Guest Check-In</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --navy: #1a2a44;
            --gold: #d4af37;
            --light-bg: #f4f6f9;
            --groom: #1a2a44;
            --bride: #808080;
        }
        
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 0;
            color: var(--navy);
        }

        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--navy);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-box h2 {
            margin: 0 0 20px 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--navy);
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            font-weight: 900;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #appContent {
            display: none;
        }

        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--light-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: #142135;
        }

        .nav-btn-icon {
            color: white;
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.8;
            padding: 5px 10px;
        }

        .nav-btn-icon:hover {
            opacity: 1;
            color: var(--gold);
        }

        .header {
            background-color: var(--navy);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .search-container {
            padding: 12px 15px;
            background: white;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 35px 12px 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--gold);
        }

        .clear-btn {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #888;
            cursor: pointer;
            display: none;
        }

        .guest-list {
            padding: 15px 15px 80px 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .guest-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid transparent;
        }

        .guest-card.pending {
            border-left-color: var(--navy);
        }

        .guest-card.arrived {
            border-left-color: #27ae60;
            opacity: 0.8;
        }

        .guest-card.unassigned {
            border-left-color: var(--gold);
        }

        .guest-info {
            flex: 1;
            margin-right: 10px;
            min-width: 0;
        }

        .guest-info h3 {
            margin: 2px 0 2px 0;
            font-size: 1.05rem;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .role-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 2px;
        }

        .role-lead {
            color: var(--navy);
        }

        .role-plus {
            color: #888;
        }

        .vip-code-label {
            font-size: 0.75rem;
            color: #555;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .badge {
            background: #e2e8f0;
            color: var(--navy);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .badge i {
            margin-right: 3px;
            opacity: 0.7;
        }

        .badge-groom {
            background: var(--groom) !important;
            color: white !important;
            border: none;
        }

        .badge-bride {
            background: var(--bride) !important;
            color: white !important;
            border: none;
        }

        .plus-guests-list {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #eee;
            font-size: 0.75rem;
            color: #555;
        }

        .plus-guest-item {
            margin-bottom: 3px;
        }

        .action-btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(26, 42, 68, 0.2);
            white-space: nowrap;
        }

        .assign-btn {
            background: var(--gold);
            color: #1a2a44;
        }

        .status-arrived {
            color: #27ae60;
            font-weight: bold;
            font-size: 0.85rem;
            text-align: right;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1rem;
            color: #888;
        }

        #stats {
            text-align: center;
            font-size: 0.75rem;
            color: var(--gold);
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>DOOR ACCESS</h2>
            <input type="text" id="username" class="login-input" placeholder="Username" autocapitalize="none">
            <input type="password" id="password" class="login-input" placeholder="Password">
            <button class="login-btn" onclick="login()">Enter</button>
            <p id="loginError" style="color:red; font-size:0.8rem; display:none; margin-top:10px;">Incorrect credentials.</p>
        </div>
    </div>

    <div id="appContent">
        <div class="sticky-top">
            <div class="nav-controls">
                <button class="nav-btn-icon" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> REFRESH
                </button>
                <button class="nav-btn-icon" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
            <div class="header">
                <h1>DOOR CHECK-IN</h1>
                <div id="stats">Loading data...</div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by Name or Code..." oninput="handleSearchInput()">
                <button id="clearBtn" class="clear-btn" onclick="clearSearch()">✖</button>
            </div>
        </div>

        <div id="guestContainer" class="guest-list">
            <div class="loading">Fetching guest list...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGsgIl759jiq7vTrnkbvzkv_WabI1pjA9tGgMu8Zw8uEQYCFw4V_sDO_os7xG837sC1g/exec"; 
        
        let allGuests = [];
        let inactivityTimer;

        function checkAuth() {
            const authTime = localStorage.getItem('checkin_timestamp');
            const isLoggedIn = localStorage.getItem('checkin_auth') === 'true';
            
            if (isLoggedIn && authTime && (Date.now() - parseInt(authTime) < 300000)) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                resetTimer();
                fetchData(true); // Force fetch on auth
            } else {
                logout();
            }
        }

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            
            if (u === 'hcadmin' && p === 'Letmein') {
                localStorage.setItem('checkin_auth', 'true');
                localStorage.setItem('checkin_timestamp', Date.now());
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('loginError').style.display = 'none';
                resetTimer();
                fetchData(true);
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('checkin_auth');
            localStorage.removeItem('checkin_timestamp');
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('appContent').style.display = 'none';
            document.getElementById('password').value = '';
        }

        function resetTimer() {
            if (localStorage.getItem('checkin_auth') === 'true') {
                localStorage.setItem('checkin_timestamp', Date.now());
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(logout, 300000);
            }
        }

        ['mousemove', 'keydown', 'scroll', 'touchstart', 'click'].forEach(evt => 
            window.addEventListener(evt, resetTimer, true)
        );

        window.onload = checkAuth;

        function fetchData(force = false) {
            // FIXED: Only return if we already have data AND we aren't forcing a refresh
            if(allGuests.length > 0 && !force) return; 
            
            document.getElementById('guestContainer').innerHTML = "<div class='loading'>Fetching guest list...</div>";

            fetch(SCRIPT_URL + "?action=getCheckInList")
                .then(response => response.json())
                .then(data => {
                    allGuests = data;
                    updateRealTimeCount();
                    renderGuests(allGuests);
                })
                .catch(error => {
                    document.getElementById('guestContainer').innerHTML = "<div class='loading' style='color:red;'>Failed to load. Refresh.</div>";
                });
        }

        function updateRealTimeCount() {
            const arrivedCount = allGuests.filter(g => g.status === 'Arrived').length;
            document.getElementById('stats').innerText = `CHECKED IN: ${arrivedCount} / ${allGuests.length}`;
        }

        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('clearBtn').style.display = query.length > 0 ? 'block' : 'none';
            
            const filtered = allGuests.filter(g => 
                g.name.toLowerCase().includes(query) || 
                g.inviteCode.toLowerCase().includes(query)
            );
            renderGuests(filtered);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').style.display = 'none';
            renderGuests(allGuests);
        }

        function renderGuests(guestsToRender) {
            const container = document.getElementById('guestContainer');
            container.innerHTML = '';
            
            if(guestsToRender.length === 0) {
                container.innerHTML = "<div class='loading'>No guests found.</div>";
                return;
            }

            const fragment = document.createDocumentFragment(); // PERFORMANCE: Faster rendering

            guestsToRender.forEach(g => {
                const isArrived = g.status === 'Arrived';
                const isLeadGuest = g.broughtBy.toLowerCase() === 'self';
                const displayTable = (!g.table || g.table == 0 || g.table === 'TBD') ? '-' : g.table;
                const displaySeat = (!g.seat || g.seat == 0 || g.seat === 'TBD') ? '-' : g.seat;
                const isUnassigned = displayTable === '-' || displaySeat === '-';

                let cardClass = isArrived ? 'guest-card arrived' : (isUnassigned ? 'guest-card unassigned' : 'guest-card pending');
                let roleText = isLeadGuest ? `👑 PRIMARY GUEST` : `👥 PLUS GUEST (OF ${g.broughtBy.toUpperCase()})`;
                let roleClass = isLeadGuest ? `role-lead` : `role-plus`;
                
                let teamIcon = '';
                let teamBadge = '';
                if(g.side && g.side.toLowerCase() === 'groom') {
                    teamIcon = '<i class="fas fa-user-tie" style="color: var(--groom); margin-left: 8px;" title="Team Groom"></i>';
                    teamBadge = '<span class="badge badge-groom">🤵 TEAM GROOM</span>';
                } else if(g.side && g.side.toLowerCase() === 'bride') {
                    teamIcon = '<i class="fas fa-ring" style="color: var(--bride); margin-left: 8px;" title="Team Bride"></i>';
                    teamBadge = '<span class="badge badge-bride">👰 TEAM BRIDE</span>';
                }

                let plusGuestsHtml = '';
                if(isLeadGuest) {
                    const associated = allGuests.filter(sub => sub.broughtBy.toLowerCase() === g.name.toLowerCase());
                    if(associated.length > 0) {
                        plusGuestsHtml = `<div class="plus-guests-list"><div style="font-weight:bold; margin-bottom:3px;">Accompanied By:</div>`;
                        associated.forEach(sub => {
                            let statusText = sub.status === 'Arrived' ? '<small style="color:#27ae60; font-weight:bold;">(Arrived)</small>' : '';
                            plusGuestsHtml += `<div class="plus-guest-item">↳ <strong>${sub.name}</strong> ${statusText}</div>`;
                        });
                        plusGuestsHtml += `</div>`;
                    }
                }

                let timeDisplay = g.checkInTime || "";
                if (timeDisplay && timeDisplay.toString().includes('T')) {
                    const dateObj = new Date(timeDisplay);
                    timeDisplay = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                }

                let actionHtml = '';
                if (isArrived) {
                    actionHtml = `<div class="status-arrived">✔ ARRIVED<br><small style="color:#888;">Arrived at: ${timeDisplay}</small></div>`;
                } else if (isUnassigned) {
                    actionHtml = `<button class="action-btn assign-btn" onclick="promptAssignSeat(${g.rowId}, '${g.name.replace(/'/g, "\\'")}')">Assign Seat</button>`;
                } else {
                    actionHtml = `<button class="action-btn" onclick="checkInGuest(${g.rowId}, '${g.name.replace(/'/g, "\\'")}')">Check In</button>`;
                }

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                        <div class="guest-info">
                            <span class="role-badge ${roleClass}">${roleText}</span>
                            <h3>${teamBadge} <br/> ${g.name}</h3>
                            <span class="vip-code-label">CODE: ${g.inviteCode}</span>
                            <div class="badges">
                                
                                <span class="badge" title="Table Number"><i class="fas fa-utensils"></i>  ${displayTable}</span>
                                <span class="badge" title="Seat Number"><i class="fas fa-chair"></i>  ${displaySeat}</span>
                            </div>
                            ${plusGuestsHtml}
                        </div>
                        <div class="guest-action">
                            ${actionHtml}
                        </div>`;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        function promptAssignSeat(rowId, guestName) {
            const uniqueTables = [...new Set(allGuests.map(g => g.table).filter(t => t && t !== '-' && t !== 'TBD' && t != 0))].sort((a,b) => parseInt(a) - parseInt(b));
            
            let tableOptions = uniqueTables.map(t => `<option value="${t}">Table ${t}</option>`).join('');

            Swal.fire({
                title: 'Assign Seating',
                text: `Guest: ${guestName}`,
                html: `
                    <select id="swal-table" class="login-input" onchange="updateAvailableSeats()">
                        <option value="" disabled selected>Select an Available Table</option>
                        ${tableOptions}
                    </select>
                    <select id="swal-seat" class="login-input" disabled>
                        <option value="">Select a Table First</option>
                    </select>
                `,
                showCancelButton: true,
                confirmButtonText: 'Save Assignment',
                confirmButtonColor: '#1a2a44',
                preConfirm: () => {
                    const t = document.getElementById('swal-table').value;
                    const s = document.getElementById('swal-seat').value;
                    if (!t || !s) {
                        Swal.showValidationMessage('Please select both a Table and a Seat');
                        return false;
                    }
                    return { table: t, seat: s };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    saveSeatAssignment(rowId, guestName, result.value.table, result.value.seat);
                }
            });
        }

        window.updateAvailableSeats = function() {
            const tableNum = document.getElementById('swal-table').value;
            const seatSelect = document.getElementById('swal-seat');
            seatSelect.disabled = false;
            
            const maxSeats = 12; 
            const takenSeats = allGuests.filter(g => g.table == tableNum && g.seat && g.seat != 0 && g.seat != '-').map(g => parseInt(g.seat));
            
            let seatOptions = '<option value="" disabled selected>Select Available Seat</option>';
            for(let i = 1; i <= maxSeats; i++) {
                if(!takenSeats.includes(i)) {
                    seatOptions += `<option value="${i}">Seat ${i}</option>`;
                }
            }
            seatSelect.innerHTML = seatOptions;
        };

        function saveSeatAssignment(rowId, guestName, table, seat) {
            Swal.fire({
                title: 'Saving Assignment...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const formData = new FormData();
            formData.append('action', 'assignSeat');
            formData.append('rowId', rowId);
            formData.append('table', table);
            formData.append('seat', seat);
            
            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if(data.result === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'Seat Assigned Successfully',
                            confirmButtonText: 'OK',
                            confirmButtonColor: '#1a2a44'
                        });
                        
                        const idx = allGuests.findIndex(g => g.rowId === rowId);
                        if(idx !== -1) {
                            allGuests[idx].table = table;
                            allGuests[idx].seat = seat;
                        }
                        handleSearchInput();
                    } else {
                        Swal.fire('Error', data.error, 'error');
                    }
                })
                .catch(() => Swal.fire('Error', 'Connection failed.', 'error'));
        }

        function checkInGuest(rowId, guestName) {
            Swal.fire({
                title: 'Processing Check-In...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const formData = new FormData();
            formData.append('action', 'markArrived');
            formData.append('rowId', rowId);
            
            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if(data.result === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'Guest Checked In',
                            text: `${guestName} has arrived.`,
                            confirmButtonText: 'OK',
                            confirmButtonColor: '#1a2a44'
                        });
                        
                        const idx = allGuests.findIndex(g => g.rowId === rowId);
                        if(idx !== -1) {
                            allGuests[idx].status = 'Arrived';
                            allGuests[idx].checkInTime = data.timestamp;
                        }
                        
                        updateRealTimeCount();
                        handleSearchInput();
                    } else {
                        Swal.fire('Error', data.error, 'error');
                    }
                })
                .catch(() => Swal.fire('Error', 'Failed to process check-in.', 'error'));
        }
    </script>
</body>
</html>
